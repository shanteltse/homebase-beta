workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: 26.0
      node: 20
      vars:
        BUNDLE_ID: com.shanteltse.homebase
        XCODE_PROJECT: apps/web/ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APPLE_TEAM_ID: P8GPR7V2U6
      groups:
        # Contains the following encrypted variables:
        #   APP_STORE_CONNECT_KEY_IDENTIFIER  — Key ID from App Store Connect API
        #   APP_STORE_CONNECT_ISSUER_ID       — Issuer ID from App Store Connect API
        #   APP_STORE_CONNECT_PRIVATE_KEY     — Contents of the .p8 file
        #   CERTIFICATE_PRIVATE_KEY           — RSA private key for the distribution certificate
        #     Generate with: ssh-keygen -t rsa -b 2048 -m PEM -f certificate_key
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.shanteltse.homebase

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: cd apps/web && pnpm build

      - name: Sync Capacitor iOS
        script: cd apps/web && npx cap sync ios

      - name: Fetch signing certificate and provisioning profile
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - shantel.tse@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
